<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aula 15 · Slides</title>
  <style>
    body { margin: 0; font-family: 'Segoe UI', Tahoma, system-ui, sans-serif; overflow: hidden; background: #16233d; color: white; }
    #slider { width: 100vw; height: 100vh; position: relative; }
    .slide { width: 100%; height: 100%; position: absolute; top: 0; left: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem 2rem 80px; box-sizing: border-box; opacity: 0; transition: opacity 0.4s ease, transform 0.4s ease; pointer-events: none; z-index: 1; transform: scale(0.95); }
    .slide.active { opacity: 1; pointer-events: auto; z-index: 2; transform: scale(1); }
    
    .slide-start { background: linear-gradient(135deg, #1a2f5e, #1f6fb2); }
    .slide-start h1 { font-size: clamp(2rem, 5vw, 4rem); margin-bottom: 0.5rem; }
    .slide-start .badge { display: inline-block; background: rgba(255,255,255,0.2); padding: 0.5rem 1.2rem; border-radius: 999px; margin-bottom: 1.5rem; font-weight: bold; letter-spacing: 1px; }
    .slide-start p { font-size: clamp(1.2rem, 2.5vw, 1.8rem); max-width: 800px; opacity: 0.9; line-height: 1.4; }

    .slide-prof { background: linear-gradient(135deg, #00a3d9, #1f6fb2); }
    .slide-prof h2 { font-size: clamp(2rem, 4vw, 3.5rem); margin-bottom: 1rem; }
    .slide-prof p { font-size: clamp(1.1rem, 2vw, 1.6rem); max-width: 700px; opacity: 0.95; line-height: 1.5; }
    .prof-avatar { font-size: 5rem; margin-bottom: 1rem; }

    .slide-end { background: #f4f8fb; color: #1a2f5e; }
    .slide-end h2 { font-size: clamp(2rem, 4vw, 3.5rem); margin-bottom: 1rem; }
    .slide-end p { font-size: clamp(1.1rem, 2vw, 1.6rem); color: #64748b; margin-bottom: 2.5rem; }
    
    /* Controles e Footer */
    #controls { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: rgba(15, 23, 42, 0.7); display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; box-sizing: border-box; z-index: 10; backdrop-filter: blur(8px); border-top: 1px solid rgba(255,255,255,0.1); }
    .footer-text { font-size: 0.9rem; opacity: 0.85; font-weight: 600; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 1rem; }
    .btn-group { display: flex; gap: 0.5rem; }
    .ctrl-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 1rem; padding: 0.4rem 0.8rem; border-radius: 8px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; text-decoration: none; font-weight: 600; }
    .ctrl-btn:hover { background: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.4); }
    .ctrl-btn:disabled { opacity: 0.2; cursor: not-allowed; background: transparent; }
    .ctrl-icon { font-size: 1.1rem; margin-right: 0.3rem; }
    .ctrl-btn-only-icon { font-size: 1.2rem; padding: 0.4rem 1rem; }
    
    @media (max-width: 768px) {
       .footer-text { display: none; }
       #controls { justify-content: center; }
    }
  </style>
</head>
<body>
  <div id="slider">
    <!-- Slide Início -->
    <div class="slide slide-start active">
      <div class="badge">AULA 15 · 18/11</div>
      <h1>Laboratório de Dados &amp; IA</h1>
      <p>Estudo de Caso: Programação para previsão de caixas</p>
    </div>

    <!-- Slide Finalização -->
    <div class="slide slide-end">
      <h2>Fim da Aula 15</h2>
      <p>Obrigado pela atenção!</p>
    </div>
  </div>

  <div id="controls">
    <div class="footer-text">Laboratório de Programação, Ciência de Dados &amp; IA</div>
    <div class="btn-group">
      <a href="../index.html" class="ctrl-btn" title="Voltar ao Cronograma"><span class="ctrl-icon">🏠</span> Home</a>
      <a href="../materiais/aula-15/index.html" class="ctrl-btn" title="Ir para o Material"><span class="ctrl-icon">📎</span> Material</a>
      <button class="ctrl-btn ctrl-btn-only-icon" id="btn-prev" title="Slide Anterior (Seta Esquerda)">◄</button>
      <button class="ctrl-btn ctrl-btn-only-icon" id="btn-next" title="Próximo Slide (Seta Direita ou Espaço)">►</button>
      <button class="ctrl-btn ctrl-btn-only-icon" id="btn-fs" title="Tela Cheia">⛶</button>
    </div>
  </div>

  <script>
    const slides = document.querySelectorAll('.slide');
    let current = 0;
    const btnPrev = document.getElementById('btn-prev');
    const btnNext = document.getElementById('btn-next');
    const btnFs = document.getElementById('btn-fs');

    function update() {
      slides.forEach((s, i) => {
        if (i === current) s.classList.add('active');
        else s.classList.remove('active');
      });
      btnPrev.disabled = current === 0;
      btnNext.disabled = current === slides.length - 1;
    }

    btnPrev.addEventListener('click', () => { if (current > 0) { current--; update(); } });
    btnNext.addEventListener('click', () => { if (current < slides.length - 1) { current++; update(); } });
    
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ') { if (current < slides.length - 1) { current++; update(); } }
      if (e.key === 'ArrowLeft') { if (current > 0) { current--; update(); } }
    });

    btnFs.addEventListener('click', () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else if (document.exitFullscreen) document.exitFullscreen();
    });

    update();
  </script>
</body>
</html>
